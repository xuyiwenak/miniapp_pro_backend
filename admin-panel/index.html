<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理后台 — 艺术平台</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    :root { --sidebar-w: 230px; --sidebar-bg: #16213e; --sidebar-accent: #0f3460; }
    body { background: #f0f2f5; font-size: 14px; }

    /* ── Login ── */
    #login-page {
      min-height: 100vh;
      background: linear-gradient(135deg, var(--sidebar-bg) 0%, var(--sidebar-accent) 100%);
      display: flex; align-items: center; justify-content: center;
    }
    .login-card { width: 380px; border-radius: 16px; box-shadow: 0 20px 60px rgba(0,0,0,.3); }

    /* ── Layout ── */
    #app { display: none; min-height: 100vh; }
    #sidebar {
      width: var(--sidebar-w); min-height: 100vh; background: var(--sidebar-bg);
      color: #fff; display: flex; flex-direction: column; flex-shrink: 0;
      position: fixed; top: 0; left: 0; bottom: 0; z-index: 100;
    }
    .sidebar-logo {
      padding: 22px 20px 18px; font-size: 1.05rem; font-weight: 700;
      border-bottom: 1px solid rgba(255,255,255,.08); letter-spacing: .5px;
    }
    .sidebar-user { padding: 12px 20px; font-size: 12px; color: rgba(255,255,255,.5); border-bottom: 1px solid rgba(255,255,255,.06); }
    .sidebar-user span { color: rgba(255,255,255,.85); font-weight: 600; }
    .sidebar-nav { flex: 1; padding: 8px 0; }
    .nav-item { padding: 0 10px; margin-bottom: 2px; }
    .nav-link-item {
      display: flex; align-items: center; gap: 10px; padding: 10px 14px;
      color: rgba(255,255,255,.65); border-radius: 8px; text-decoration: none;
      transition: all .15s; font-size: 13.5px;
    }
    .nav-link-item:hover { background: rgba(255,255,255,.08); color: #fff; }
    .nav-link-item.active { background: #e94560; color: #fff; }
    .nav-link-item i { font-size: 16px; width: 20px; text-align: center; }
    .sidebar-footer { padding: 16px; border-top: 1px solid rgba(255,255,255,.08); }

    #main { margin-left: var(--sidebar-w); padding: 28px 32px; min-height: 100vh; }

    /* ── Pages ── */
    .page { display: none; }
    .page.active { display: block; }
    .page-title { font-size: 1.25rem; font-weight: 700; color: #1a1a2e; margin-bottom: 24px; }

    /* ── Stats Cards ── */
    .stat-card {
      background: #fff; border-radius: 12px; padding: 22px 24px;
      box-shadow: 0 1px 4px rgba(0,0,0,.06); display: flex; align-items: center; gap: 18px;
    }
    .stat-icon { width: 52px; height: 52px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 22px; }
    .stat-num { font-size: 1.7rem; font-weight: 700; line-height: 1; margin-bottom: 4px; }
    .stat-label { font-size: 12px; color: #888; }

    /* ── Table Card ── */
    .table-card { background: #fff; border-radius: 12px; box-shadow: 0 1px 4px rgba(0,0,0,.06); overflow: hidden; }
    .table-toolbar { padding: 16px 20px; border-bottom: 1px solid #f0f0f0; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; }
    .table { margin: 0; }
    .table thead th { background: #fafafa; font-weight: 600; font-size: 13px; color: #555; border-top: none; padding: 12px 16px; }
    .table tbody td { padding: 12px 16px; vertical-align: middle; font-size: 13px; }
    .table tbody tr:hover { background: #fafbff; }
    .cover-thumb { width: 48px; height: 48px; object-fit: cover; border-radius: 6px; background: #f0f0f0; }
    .text-truncate-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; max-width: 200px; }

    /* ── Pagination ── */
    .pagination-bar { padding: 12px 20px; border-top: 1px solid #f0f0f0; display: flex; align-items: center; justify-content: space-between; }
    .pagination-info { font-size: 12px; color: #888; }

    /* ── Badges ── */
    .badge-level-1 { background: #fff1f0; color: #e84040; }
    .badge-level-2 { background: #e6f4ff; color: #1677ff; }
    .badge-level-3 { background: #f5f5f5; color: #666; }
    .badge-published { background: #f6ffed; color: #52c41a; }
    .badge-draft { background: #f5f5f5; color: #888; }
    .badge-pending { background: #fff7e6; color: #fa8c16; }
    .badge-processing { background: #e6f4ff; color: #1677ff; }
    .badge-resolved { background: #f6ffed; color: #52c41a; }
    .status-badge { padding: 2px 10px; border-radius: 20px; font-size: 12px; font-weight: 500; display: inline-block; }

    /* ── Toast ── */
    .toast-container { position: fixed; top: 20px; right: 20px; z-index: 9999; }
    .toast { min-width: 240px; }

    /* ── Loading ── */
    .spinner-overlay { text-align: center; padding: 40px; color: #aaa; }
  </style>
</head>
<body>

<!-- ═══════════════ Login Page ═══════════════ -->
<div id="login-page">
  <div class="login-card card border-0">
    <div class="card-body p-5">
      <div class="text-center mb-4">
        <div style="font-size:2.5rem; color:#e94560;">🎨</div>
        <h5 class="fw-bold mt-2 mb-0">艺术平台管理后台</h5>
        <p class="text-muted small mt-1">请使用管理员账号登录</p>
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold">账号</label>
        <input id="login-account" type="text" class="form-control" placeholder="管理员账号" autocomplete="username">
      </div>
      <div class="mb-4">
        <label class="form-label fw-semibold">密码</label>
        <input id="login-password" type="password" class="form-control" placeholder="密码" autocomplete="current-password">
      </div>
      <button id="login-btn" class="btn w-100 text-white fw-bold" style="background:#e94560; border:none;">登 录</button>
      <div id="login-error" class="text-danger text-center small mt-3"></div>
    </div>
  </div>
</div>

<!-- ═══════════════ Main App ═══════════════ -->
<div id="app">
  <!-- Sidebar -->
  <div id="sidebar">
    <div class="sidebar-logo"><i class="bi bi-palette2 me-2" style="color:#e94560;"></i>管理后台</div>
    <div class="sidebar-user" id="sidebar-user">欢迎，<span id="admin-name">加载中...</span></div>
    <nav class="sidebar-nav">
      <div class="nav-item">
        <a href="#" class="nav-link-item active" data-page="dashboard"><i class="bi bi-speedometer2"></i>仪表盘</a>
      </div>
      <div class="nav-item">
        <a href="#" class="nav-link-item" data-page="users"><i class="bi bi-people-fill"></i>用户管理</a>
      </div>
      <div class="nav-item">
        <a href="#" class="nav-link-item" data-page="works"><i class="bi bi-images"></i>作品管理</a>
      </div>
      <div class="nav-item">
        <a href="#" class="nav-link-item" data-page="feedback"><i class="bi bi-chat-left-text-fill"></i>反馈管理</a>
      </div>
    </nav>
    <div class="sidebar-footer">
      <button id="logout-btn" class="btn btn-outline-light btn-sm w-100"><i class="bi bi-box-arrow-right me-1"></i>退出登录</button>
    </div>
  </div>

  <!-- Main Content -->
  <div id="main">

    <!-- ── Dashboard ── -->
    <div id="page-dashboard" class="page active">
      <div class="page-title">🏠 仪表盘</div>
      <div class="row g-3" id="stats-cards">
        <div class="col-12 spinner-overlay"><div class="spinner-border text-secondary" style="width:2rem;height:2rem;"></div></div>
      </div>
    </div>

    <!-- ── Users ── -->
    <div id="page-users" class="page">
      <div class="page-title">👥 用户管理</div>
      <div class="table-card">
        <div class="table-toolbar">
          <div class="d-flex gap-2 flex-wrap">
            <input id="user-search" type="text" class="form-control form-control-sm" placeholder="搜索账号 / 昵称" style="width:200px;">
            <select id="user-level" class="form-select form-select-sm" style="width:130px;">
              <option value="">全部角色</option>
              <option value="1">超级管理员</option>
              <option value="2">普通管理员</option>
              <option value="3">普通用户</option>
            </select>
            <button class="btn btn-sm btn-primary" id="user-search-btn"><i class="bi bi-search me-1"></i>搜索</button>
          </div>
        </div>
        <div class="table-responsive">
          <table class="table">
            <thead><tr>
              <th>账号</th><th>昵称</th><th>角色</th><th>注册时间</th><th style="width:160px;">操作</th>
            </tr></thead>
            <tbody id="users-tbody"></tbody>
          </table>
        </div>
        <div class="pagination-bar" id="users-page-bar"></div>
      </div>
    </div>

    <!-- ── Works ── -->
    <div id="page-works" class="page">
      <div class="page-title">🖼 作品管理</div>
      <div class="table-card">
        <div class="table-toolbar">
          <div class="d-flex gap-2">
            <select id="works-status" class="form-select form-select-sm" style="width:130px;">
              <option value="">全部状态</option>
              <option value="published">已发布</option>
              <option value="draft">草稿</option>
            </select>
            <button class="btn btn-sm btn-primary" id="works-filter-btn"><i class="bi bi-funnel me-1"></i>筛选</button>
          </div>
        </div>
        <div class="table-responsive">
          <table class="table">
            <thead><tr>
              <th>封面</th><th>描述</th><th>作者ID</th><th>标签</th><th>状态</th><th>发布时间</th><th style="width:160px;">操作</th>
            </tr></thead>
            <tbody id="works-tbody"></tbody>
          </table>
        </div>
        <div class="pagination-bar" id="works-page-bar"></div>
      </div>
    </div>

    <!-- ── Feedback ── -->
    <div id="page-feedback" class="page">
      <div class="page-title">💬 反馈管理</div>
      <div class="table-card">
        <div class="table-toolbar">
          <div class="d-flex gap-2">
            <select id="feedback-status" class="form-select form-select-sm" style="width:130px;">
              <option value="">全部状态</option>
              <option value="pending">待处理</option>
              <option value="processing">处理中</option>
              <option value="resolved">已解决</option>
            </select>
            <button class="btn btn-sm btn-primary" id="feedback-filter-btn"><i class="bi bi-funnel me-1"></i>筛选</button>
          </div>
        </div>
        <div class="table-responsive">
          <table class="table">
            <thead><tr>
              <th>标题</th><th>内容</th><th>用户ID</th><th>状态</th><th>回复</th><th>时间</th><th style="width:80px;">操作</th>
            </tr></thead>
            <tbody id="feedback-tbody"></tbody>
          </table>
        </div>
        <div class="pagination-bar" id="feedback-page-bar"></div>
      </div>
    </div>

  </div><!-- /main -->
</div><!-- /app -->

<!-- ═══════════════ Modals ═══════════════ -->

<!-- Change Level Modal -->
<div class="modal fade" id="levelModal" tabindex="-1">
  <div class="modal-dialog modal-sm">
    <div class="modal-content">
      <div class="modal-header py-3">
        <h6 class="modal-title fw-bold">修改用户角色</h6>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="level-uid">
        <label class="form-label small fw-semibold">选择新角色</label>
        <select id="level-select" class="form-select">
          <option value="1">超级管理员</option>
          <option value="2">普通管理员</option>
          <option value="3">普通用户</option>
        </select>
      </div>
      <div class="modal-footer py-2">
        <button class="btn btn-secondary btn-sm" data-bs-dismiss="modal">取消</button>
        <button class="btn btn-primary btn-sm" id="level-confirm-btn">确认修改</button>
      </div>
    </div>
  </div>
</div>

<!-- Reply Feedback Modal -->
<div class="modal fade" id="replyModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header py-3">
        <h6 class="modal-title fw-bold">回复反馈</h6>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="reply-id">
        <div class="mb-3">
          <div id="reply-preview" class="p-3 rounded bg-light small text-muted" style="white-space:pre-wrap;"></div>
        </div>
        <div class="mb-3">
          <label class="form-label small fw-semibold">处理状态</label>
          <select id="reply-status" class="form-select form-select-sm">
            <option value="pending">待处理</option>
            <option value="processing">处理中</option>
            <option value="resolved">已解决</option>
          </select>
        </div>
        <div>
          <label class="form-label small fw-semibold">回复内容</label>
          <textarea id="reply-content" class="form-control" rows="4" placeholder="输入回复内容（可选）"></textarea>
        </div>
      </div>
      <div class="modal-footer py-2">
        <button class="btn btn-secondary btn-sm" data-bs-dismiss="modal">取消</button>
        <button class="btn btn-primary btn-sm" id="reply-confirm-btn">提交回复</button>
      </div>
    </div>
  </div>
</div>

<!-- Delete Confirm Modal -->
<div class="modal fade" id="deleteModal" tabindex="-1">
  <div class="modal-dialog modal-sm">
    <div class="modal-content">
      <div class="modal-header py-3 border-0">
        <h6 class="modal-title fw-bold text-danger"><i class="bi bi-exclamation-triangle me-2"></i>确认删除</h6>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body pt-0" id="delete-msg">此操作不可撤销，确认删除吗？</div>
      <div class="modal-footer py-2">
        <button class="btn btn-secondary btn-sm" data-bs-dismiss="modal">取消</button>
        <button class="btn btn-danger btn-sm" id="delete-confirm-btn">确认删除</button>
      </div>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast-container">
  <div id="toast" class="toast border-0 text-white" role="alert">
    <div class="d-flex">
      <div class="toast-body fw-semibold" id="toast-body"></div>
      <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
// ═══════════════════════════ State ═══════════════════════════
const S = {
  token: localStorage.getItem('_adm_token') || '',
  myLevel: 3,
  users:    { page: 1, total: 0, search: '', level: '' },
  works:    { page: 1, total: 0, status: '' },
  feedback: { page: 1, total: 0, status: '' },
};
const LIMIT = 20;

// ═══════════════════════════ API Helper ═══════════════════════════
async function api(method, path, body) {
  const opts = {
    method,
    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + S.token },
  };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(path, opts);
  const json = await res.json().catch(() => ({}));
  return json;
}

// ═══════════════════════════ Toast ═══════════════════════════
function toast(msg, ok = true) {
  const el = document.getElementById('toast');
  el.className = `toast border-0 text-white ${ok ? 'bg-success' : 'bg-danger'}`;
  document.getElementById('toast-body').textContent = msg;
  new bootstrap.Toast(el, { delay: 2500 }).show();
}

// ═══════════════════════════ Formatters ═══════════════════════════
function fmtDate(d) {
  if (!d) return '—';
  return new Date(d).toLocaleString('zh-CN', { year:'numeric', month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit' });
}
function levelBadge(l) {
  const m = { 1: ['超级管理员','1'], 2: ['普通管理员','2'], 3: ['普通用户','3'] };
  const [text, cls] = m[l] || ['未知', '3'];
  return `<span class="status-badge badge-level-${cls}">${text}</span>`;
}
function statusBadge(s, type) {
  const maps = {
    work:     { published: ['已发布','published'], draft: ['草稿','draft'] },
    feedback: { pending: ['待处理','pending'], processing: ['处理中','processing'], resolved: ['已解决','resolved'] },
  };
  const [text, cls] = (maps[type] && maps[type][s]) || [s, 'draft'];
  return `<span class="status-badge badge-${cls}">${text}</span>`;
}

// ═══════════════════════════ Page Switching ═══════════════════════════
function showPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-link-item').forEach(a => a.classList.remove('active'));
  document.getElementById('page-' + name)?.classList.add('active');
  document.querySelector(`[data-page="${name}"]`)?.classList.add('active');
  if (name === 'dashboard') loadDashboard();
  if (name === 'users')     loadUsers(1);
  if (name === 'works')     loadWorks(1);
  if (name === 'feedback')  loadFeedback(1);
}

// ═══════════════════════════ Dashboard ═══════════════════════════
async function loadDashboard() {
  document.getElementById('stats-cards').innerHTML =
    '<div class="col-12 spinner-overlay"><div class="spinner-border text-secondary"></div></div>';
  const r = await api('GET', '/admin/stats');
  if (!r.success) { document.getElementById('stats-cards').innerHTML = '<div class="col-12 text-danger p-3">加载失败</div>'; return; }
  const d = r.data;
  const cards = [
    { icon: 'bi-people-fill', color: '#4f46e5', bg: '#ede9fe', label: '总用户数', value: d.totalUsers },
    { icon: 'bi-images',      color: '#0891b2', bg: '#cffafe', label: '作品总数', value: d.totalWorks },
    { icon: 'bi-check-circle-fill', color: '#16a34a', bg: '#dcfce7', label: '已发布作品', value: d.publishedWorks },
    { icon: 'bi-file-earmark-text', color: '#d97706', bg: '#fef3c7', label: '草稿数',   value: d.draftWorks },
    { icon: 'bi-chat-left-text-fill', color: '#db2777', bg: '#fce7f3', label: '反馈总数', value: d.totalFeedback },
    { icon: 'bi-clock-fill', color: '#ea580c', bg: '#ffedd5', label: '待处理反馈', value: d.pendingFeedback },
  ];
  document.getElementById('stats-cards').innerHTML = cards.map(c => `
    <div class="col-6 col-md-4 col-xl-2">
      <div class="stat-card">
        <div class="stat-icon" style="background:${c.bg};color:${c.color}"><i class="bi ${c.icon}"></i></div>
        <div><div class="stat-num" style="color:${c.color}">${c.value ?? 0}</div><div class="stat-label">${c.label}</div></div>
      </div>
    </div>`).join('');
}

// ═══════════════════════════ Users ═══════════════════════════
async function loadUsers(page) {
  S.users.page = page;
  const tbody = document.getElementById('users-tbody');
  tbody.innerHTML = '<tr><td colspan="5" class="spinner-overlay"><div class="spinner-border spinner-border-sm"></div> 加载中...</td></tr>';
  const params = new URLSearchParams({ page, limit: LIMIT });
  if (S.users.search) params.set('search', S.users.search);
  if (S.users.level)  params.set('level', S.users.level);
  const r = await api('GET', '/admin/users?' + params);
  if (!r.success) { tbody.innerHTML = '<tr><td colspan="5" class="text-danger text-center py-3">加载失败</td></tr>'; return; }
  S.users.total = r.data.total;
  const rows = r.data.list.map(u => `
    <tr>
      <td><code class="text-muted small">${u.account}</code></td>
      <td>${u.nickname || '<span class="text-muted">—</span>'}</td>
      <td>${levelBadge(u.level)}</td>
      <td class="text-muted">${fmtDate(u.createdAt)}</td>
      <td>
        ${S.myLevel === 1 ? `<button class="btn btn-xs btn-outline-primary me-1" onclick="openLevelModal('${u.userId}',${u.level})"><i class="bi bi-pencil"></i> 角色</button>` : ''}
        ${S.myLevel === 1 ? `<button class="btn btn-xs btn-outline-danger" onclick="openDeleteModal('user','${u.userId}','用户 ${u.account}')"><i class="bi bi-trash"></i></button>` : '<span class="text-muted small">—</span>'}
      </td>
    </tr>`).join('') || '<tr><td colspan="5" class="text-center text-muted py-4">暂无数据</td></tr>';
  tbody.innerHTML = rows;
  renderPageBar('users-page-bar', S.users.total, page, p => loadUsers(p));
}

// ═══════════════════════════ Works ═══════════════════════════
async function loadWorks(page) {
  S.works.page = page;
  const tbody = document.getElementById('works-tbody');
  tbody.innerHTML = '<tr><td colspan="7" class="spinner-overlay"><div class="spinner-border spinner-border-sm"></div> 加载中...</td></tr>';
  const params = new URLSearchParams({ page, limit: LIMIT });
  if (S.works.status) params.set('status', S.works.status);
  const r = await api('GET', '/admin/works?' + params);
  if (!r.success) { tbody.innerHTML = '<tr><td colspan="7" class="text-danger text-center py-3">加载失败</td></tr>'; return; }
  S.works.total = r.data.total;
  const rows = r.data.list.map(w => {
    const cover = w.coverUrl ? `<img src="${esc(w.coverUrl)}" class="cover-thumb" onerror="this.style.background='#eee';this.removeAttribute('src')">` : '<div class="cover-thumb"></div>';
    const tags = (w.tags || []).map(t => `<span class="badge bg-light text-muted me-1">${esc(t)}</span>`).join('');
    const toggleLabel = w.status === 'published' ? '转草稿' : '发布';
    const toggleStatus = w.status === 'published' ? 'draft' : 'published';
    return `
    <tr>
      <td>${cover}</td>
      <td><div class="text-truncate-2">${esc(w.desc || '—')}</div></td>
      <td><code class="text-muted small">${w.authorId?.slice(0,8) || '—'}…</code></td>
      <td>${tags || '<span class="text-muted">—</span>'}</td>
      <td>${statusBadge(w.status, 'work')}</td>
      <td class="text-muted">${fmtDate(w.createdAt)}</td>
      <td>
        <button class="btn btn-xs btn-outline-secondary me-1" onclick="changeWorkStatus('${w.workId}','${toggleStatus}')">${toggleLabel}</button>
        <button class="btn btn-xs btn-outline-danger" onclick="openDeleteModal('work','${w.workId}','此作品')"><i class="bi bi-trash"></i></button>
      </td>
    </tr>`;
  }).join('') || '<tr><td colspan="7" class="text-center text-muted py-4">暂无数据</td></tr>';
  tbody.innerHTML = rows;
  renderPageBar('works-page-bar', S.works.total, page, p => loadWorks(p));
}

async function changeWorkStatus(workId, status) {
  const r = await api('PATCH', `/admin/works/${workId}/status`, { status });
  if (r.success) { toast('状态已更新'); loadWorks(S.works.page); }
  else toast(r.message || '操作失败', false);
}

// ═══════════════════════════ Feedback ═══════════════════════════
async function loadFeedback(page) {
  S.feedback.page = page;
  const tbody = document.getElementById('feedback-tbody');
  tbody.innerHTML = '<tr><td colspan="7" class="spinner-overlay"><div class="spinner-border spinner-border-sm"></div> 加载中...</td></tr>';
  const params = new URLSearchParams({ page, limit: LIMIT });
  if (S.feedback.status) params.set('status', S.feedback.status);
  const r = await api('GET', '/admin/feedback?' + params);
  if (!r.success) { tbody.innerHTML = '<tr><td colspan="7" class="text-danger text-center py-3">加载失败</td></tr>'; return; }
  S.feedback.total = r.data.total;
  const rows = r.data.list.map(f => `
    <tr>
      <td class="fw-semibold">${esc(f.title || '—')}</td>
      <td><div class="text-truncate-2">${esc(f.content || '—')}</div></td>
      <td><code class="text-muted small">${f.userId?.slice(0,8) || '—'}…</code></td>
      <td>${statusBadge(f.status, 'feedback')}</td>
      <td><div class="text-truncate-2 text-muted">${esc(f.reply || '—')}</div></td>
      <td class="text-muted">${fmtDate(f.createdAt)}</td>
      <td><button class="btn btn-xs btn-outline-primary" onclick="openReplyModal('${f._id}','${esc(f.title)}','${esc(f.content)}','${f.status}','${esc(f.reply||'')}')"><i class="bi bi-reply"></i> 回复</button></td>
    </tr>`).join('') || '<tr><td colspan="7" class="text-center text-muted py-4">暂无数据</td></tr>';
  tbody.innerHTML = rows;
  renderPageBar('feedback-page-bar', S.feedback.total, page, p => loadFeedback(p));
}

// ═══════════════════════════ Pagination ═══════════════════════════
function renderPageBar(elId, total, page, onPage) {
  const totalPages = Math.max(1, Math.ceil(total / LIMIT));
  const start = (page - 1) * LIMIT + 1;
  const end = Math.min(page * LIMIT, total);
  document.getElementById(elId).innerHTML = `
    <span class="pagination-info">共 ${total} 条，第 ${start}–${end} 条</span>
    <div class="d-flex gap-1">
      <button class="btn btn-sm btn-outline-secondary" ${page <= 1 ? 'disabled' : ''} onclick="(${onPage.toString()})(${page - 1})">
        <i class="bi bi-chevron-left"></i>
      </button>
      <span class="btn btn-sm btn-light disabled">${page} / ${totalPages}</span>
      <button class="btn btn-sm btn-outline-secondary" ${page >= totalPages ? 'disabled' : ''} onclick="(${onPage.toString()})(${page + 1})">
        <i class="bi bi-chevron-right"></i>
      </button>
    </div>`;
}

// ═══════════════════════════ Modals ═══════════════════════════
function openLevelModal(userId, currentLevel) {
  document.getElementById('level-uid').value = userId;
  document.getElementById('level-select').value = currentLevel;
  new bootstrap.Modal(document.getElementById('levelModal')).show();
}

let _deleteAction = null;
function openDeleteModal(type, id, label) {
  document.getElementById('delete-msg').textContent = `确认删除「${label}」？此操作不可撤销。`;
  _deleteAction = { type, id };
  new bootstrap.Modal(document.getElementById('deleteModal')).show();
}

function openReplyModal(id, title, content, status, reply) {
  document.getElementById('reply-id').value = id;
  document.getElementById('reply-preview').textContent = `标题：${title}\n内容：${content}`;
  document.getElementById('reply-status').value = status || 'pending';
  document.getElementById('reply-content').value = reply || '';
  new bootstrap.Modal(document.getElementById('replyModal')).show();
}

// ═══════════════════════════ Event Handlers ═══════════════════════════
document.getElementById('level-confirm-btn').onclick = async () => {
  const userId = document.getElementById('level-uid').value;
  const level = parseInt(document.getElementById('level-select').value);
  const r = await api('PATCH', `/admin/users/${userId}/level`, { level });
  bootstrap.Modal.getInstance(document.getElementById('levelModal'))?.hide();
  if (r.success) { toast('角色已更新'); loadUsers(S.users.page); }
  else toast(r.message || '操作失败', false);
};

document.getElementById('delete-confirm-btn').onclick = async () => {
  if (!_deleteAction) return;
  const { type, id } = _deleteAction;
  const path = type === 'user' ? `/admin/users/${id}` : `/admin/works/${id}`;
  const r = await api('DELETE', path);
  bootstrap.Modal.getInstance(document.getElementById('deleteModal'))?.hide();
  if (r.success) {
    toast('删除成功');
    if (type === 'user') loadUsers(S.users.page);
    else loadWorks(S.works.page);
  } else toast(r.message || '删除失败', false);
};

document.getElementById('reply-confirm-btn').onclick = async () => {
  const id = document.getElementById('reply-id').value;
  const status = document.getElementById('reply-status').value;
  const reply = document.getElementById('reply-content').value.trim();
  const r = await api('PATCH', `/admin/feedback/${id}`, { status, reply });
  bootstrap.Modal.getInstance(document.getElementById('replyModal'))?.hide();
  if (r.success) { toast('回复成功'); loadFeedback(S.feedback.page); }
  else toast(r.message || '操作失败', false);
};

document.getElementById('user-search-btn').onclick = () => {
  S.users.search = document.getElementById('user-search').value.trim();
  S.users.level = document.getElementById('user-level').value;
  loadUsers(1);
};
document.getElementById('user-search').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('user-search-btn').click(); });

document.getElementById('works-filter-btn').onclick = () => {
  S.works.status = document.getElementById('works-status').value;
  loadWorks(1);
};

document.getElementById('feedback-filter-btn').onclick = () => {
  S.feedback.status = document.getElementById('feedback-status').value;
  loadFeedback(1);
};

document.querySelectorAll('.nav-link-item').forEach(a => {
  a.addEventListener('click', e => { e.preventDefault(); showPage(a.dataset.page); });
});

// ═══════════════════════════ Auth ═══════════════════════════
document.getElementById('login-btn').onclick = async () => {
  const account = document.getElementById('login-account').value.trim();
  const password = document.getElementById('login-password').value;
  const errEl = document.getElementById('login-error');
  errEl.textContent = '';
  if (!account || !password) { errEl.textContent = '请填写账号和密码'; return; }

  const btn = document.getElementById('login-btn');
  btn.disabled = true; btn.textContent = '登录中...';

  const r = await api('POST', '/login/postPasswordLogin', { account, password }).catch(() => null);
  btn.disabled = false; btn.textContent = '登 录';

  if (!r || !r.success) { errEl.textContent = r?.message || '登录失败，请检查账号密码'; return; }

  S.token = r.data.token;
  localStorage.setItem('_adm_token', S.token);
  await initApp();
};

document.getElementById('login-password').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('login-btn').click(); });

document.getElementById('logout-btn').onclick = () => {
  api('POST', '/login/logout').catch(() => {});
  S.token = '';
  localStorage.removeItem('_adm_token');
  document.getElementById('app').style.display = 'none';
  document.getElementById('login-page').style.display = 'flex';
  document.getElementById('login-account').value = '';
  document.getElementById('login-password').value = '';
};

// ═══════════════════════════ Utils ═══════════════════════════
function esc(s) {
  if (s == null) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// ═══════════════════════════ Init ═══════════════════════════
async function initApp() {
  const r = await api('GET', '/admin/me');
  if (!r.success) {
    S.token = '';
    localStorage.removeItem('_adm_token');
    document.getElementById('login-error').textContent = r.message || '权限不足，需要管理员账号';
    return;
  }
  S.myLevel = r.data.level;
  document.getElementById('admin-name').textContent = r.data.nickname || r.data.account;
  document.getElementById('login-page').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  loadDashboard();
}

// Auto-login if token exists
if (S.token) {
  initApp().catch(() => {
    localStorage.removeItem('_adm_token');
    S.token = '';
  });
}
</script>
</body>

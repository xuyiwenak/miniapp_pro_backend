name: Backend CI & Deploy

on:
  push:
    branches:
      - master   # 如果你主分支是 main，就改成 main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    env:
      IMAGE_TAG: latest
      IMAGE_NAME: ${{ secrets.ACR_REGISTRY }}/${{ secrets.ACR_NAMESPACE }}/${{ secrets.ACR_REPOSITORY }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 登录阿里云 ACR
      - name: Login to ACR
        run: |
          echo "${{ secrets.ACR_PASSWORD }}" | docker login \
            ${{ secrets.ACR_REGISTRY }} \
            -u "${{ secrets.ACR_USERNAME }}" \
            --password-stdin

      # 构建并推送镜像（使用 art_backend 目录下的 Dockerfile）
      - name: Build and push image
        run: |
          docker build \
            -t $IMAGE_NAME:$IMAGE_TAG \
            ./art_backend

          docker push $IMAGE_NAME:$IMAGE_TAG

      # 通过 SSH 登入 ECS，拉取新镜像并重启服务
      - name: Deploy to ECS via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.ECS_HOST }}
          username: ${{ secrets.ECS_USER }}
          key: ${{ secrets.ECS_SSH_KEY }}
          script: |
            cd /your/path/on/ecs   # 改成 ECS 上 docker-compose.yml 所在目录
            docker login ${{ secrets.ACR_REGISTRY }} -u "${{ secrets.ACR_USERNAME }}" -p "${{ secrets.ACR_PASSWORD }}"
            docker compose pull
            docker compose up -d

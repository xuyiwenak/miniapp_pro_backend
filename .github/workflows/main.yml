name: ArtJoy Backend CI/CD

on:
  push:
    branches:
      - master  # 如果你的主分支叫 main，请改为 main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 使用 Docker 官方 Action 登录，更稳定
      - name: Login to Aliyun ACR (Public)
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and Push Image
        uses: docker/build-push-action@v5
        with:
          context: .
          # 如果 Dockerfile 在子目录，请改这里，例如: ./art_backend
          file: ./Dockerfile 
          push: true
          tags: |
            ${{ secrets.ACR_REGISTRY }}/${{ secrets.ACR_NAMESPACE }}/${{ secrets.ACR_REPOSITORY }}:latest
            ${{ secrets.ACR_REGISTRY }}/${{ secrets.ACR_NAMESPACE }}/${{ secrets.ACR_REPOSITORY }}:${{ github.sha }}

  deploy-to-ecs:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.ECS_HOST }}
          username: root
          key: ${{ secrets.ECS_SSH_KEY }}
          script: |
            # 1. 定义变量
            VPC_REGISTRY="${{ secrets.ACR_REGISTRY_VPC }}"
            IMAGE_PATH="${{ secrets.ACR_NAMESPACE }}/${{ secrets.ACR_REPOSITORY }}:latest"
            
            # 2. 进入项目目录
            cd ~/workspace/miniapp_pro_backend
            
            # 3. 登录内网仓库 (VPC)
            echo "${{ secrets.ACR_PASSWORD }}" | docker login $VPC_REGISTRY -u "${{ secrets.ACR_USERNAME }}" --password-stdin
            
            # 4. 拉取镜像并重启服务
            # 这里强制使用 docker compose，会自动根据配置文件更新镜像
            docker compose pull
            docker compose up -d
            
            # 5. 清理旧镜像释放空间
            docker image prune -f
name: ArtJoy Backend CI/CD

on:
  push:
    branches:
      - master  # 如果你本地分支叫 main，请改为 main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 1. 登录阿里云 ACR (公网)
      - name: Login to Aliyun ACR
        uses: docker/login-action@v3
        with:
          # 域名在 Variables 中，用户名和密码在 Secrets 中
          registry: ${{ vars.ACR_REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      # 2. 构建并推送镜像
      - name: Build and Push Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # 组合：域名/命名空间/仓库名
          tags: |
            ${{ vars.ACR_REGISTRY }}/${{ secrets.ACR_NAMESPACE }}/repo:latest
            ${{ vars.ACR_REGISTRY }}/${{ secrets.ACR_NAMESPACE }}/repo:${{ github.sha }}

  deploy-to-ecs:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ vars.ECS_HOST }}  # 建议把 ECS_HOST 也补到 Variables 里
          username: root
          key: ${{ secrets.ECS_SSH_KEY }}
          script: |
            # 进入项目目录
            cd ~/workspace/miniapp_pro_backend
            
            # 使用内网域名登录加速 (VPC)
            echo "${{ secrets.ACR_PASSWORD }}" | docker login ${{ vars.ACR_REGISTRY_VPC }} -u "${{ secrets.ACR_USERNAME }}" --password-stdin
            
            # 拉取新镜像并重启
            docker compose pull
            docker compose up -d
            
            # 清理无用镜像
            docker image prune -f
# HTTP：Let’s Encrypt 校验 + 反代（证书就绪后可将下方 location / 改为仅 301 跳转 HTTPS）
# Coze 异步回调 POST /healing/coze/callback 与小程序 JSON 共用反代，无需单独 location；公网需 HTTPS 可达。
server {
    listen 80;
    server_name autorecordarchery.xyz;
    client_max_body_size 10m;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location /static/ {
        alias /usr/share/nginx/html/static/;
        access_log /var/log/nginx/static.access.log;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }

    # 小程序 wss /chat（与 location / 相同上游，显式关闭 buffering 利于长连接）
    location /chat {
        proxy_pass http://backend_app:40002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 86400s;
        proxy_buffering off;
    }

    location / {
        # 使用 compose 服务名 backend_app（与 container_name 无关）
        proxy_pass http://backend_app:40002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 86400s;
        access_log /var/log/nginx/backend.access.log;
    }

    # 证书与 443 调通后，若希望整站只走 HTTPS，可把上面整个 location / { ... } 换成：
    # location / { return 301 https://$host$request_uri; }
}

# HTTPS（需挂载 fullchain.pem / privkey.pem，见 nginx/ssl/README）
server {
    listen 443 ssl;
    http2 on;
    server_name autorecordarchery.xyz;
    client_max_body_size 10m;

    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    include /etc/nginx/includes/ssl-params.conf;

    location /static/ {
        alias /usr/share/nginx/html/static/;
        access_log /var/log/nginx/static.ssl.access.log;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }

    location /chat {
        proxy_pass http://backend_app:40002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 86400s;
        proxy_buffering off;
        access_log /var/log/nginx/backend.ssl.access.log;
    }

    location / {
        # 使用 compose 服务名 backend_app（与 container_name 无关）
        proxy_pass http://backend_app:40002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 86400s;
        access_log /var/log/nginx/backend.ssl.access.log;
    }
}

    }
    # 拦截敏感配置/状态文件探测
    location ~* \.(py|tfstate|lock\.info)$ {
        return 444;
    }
    location ~* ^/(\.well-known/security\.txt|security\.txt|\.vscode/|\.continue/|\.moltbot/|\.terraform) {
        return 444;
    }

    location /static/ {
        alias /usr/share/nginx/html/static/;
        access_log /var/log/nginx/static.ssl.access.log;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }

    # 首页图片（手动替换：将图片放到宿主机 static/images/ 目录即可生效，无需重新构建前端）
    location /images/ {
        alias /usr/share/nginx/html/static/images/;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
    }

    # 前端图片（Vite base=/app/ 时 build 产物引用 /app/images/）
    location /app/images/ {
        alias /usr/share/nginx/html/static/images/;
        expires 30d;

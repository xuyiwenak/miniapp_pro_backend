# Nginx 配置位于本目录 ./nginx/（与 monorepo 根目录 nginx/ 同步维护，修改后请两处对齐或从根目录 cp -r nginx art_backend/）。
# 在 ECS 上：仓库路径示例 /root/workspace/miniapp_pro_backend
# 典型流程：GitHub Actions / 手动 git pull 拉最新代码与 src/sysconfig → 再在项目根目录执行 docker compose up -d
# 配置目录挂载：./src/sysconfig → 容器内 /app/config（与 SYSCONFIG_ROOT 一致），子目录名需与 environment 一致（见 backend_app.environment）
#
# 构建：本文件只有 backend_app 带 build:，`docker compose build` / `docker compose build backend_app` 只会构建后端镜像。
# mongo / redis / nginx 使用 pull_policy: if_not_present，本地已有镜像时 compose pull / up 不会反复从仓库拉取。
# backend_app.build.pull: false 避免每次构建时强制拉取 Dockerfile 里的 node 基础镜像（需更新基础镜像时可临时改为 true 或 docker compose build --pull）。

services:
  mongo:
    image: mongo:7
    pull_policy: if_not_present
    container_name: miniapp-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: password
    ports:
      - "27017:27017"
    volumes:
      - ./data/mongo:/data/db
    healthcheck:
      test:
        [
          "CMD",
          "mongosh",
          "mongodb://root:password@127.0.0.1:27017/admin",
          "--quiet",
          "--eval",
          "db.adminCommand('ping')",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s

  redis:
    image: redis:7-alpine
    pull_policy: if_not_present
    container_name: miniapp-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - ./data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

  backend_app:
    build:
      context: .
      dockerfile: Dockerfile
      pull: false
    container_name: miniapp-backend
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      # 与挂载一致：宿主机 ./src/sysconfig/production → /app/config/production
      SYSCONFIG_ROOT: /app/config
      environment: production
      ENV: production
      id: front_1
      SERVER_ID: front_1
      gameType: front
      GAME_TYPE: front
      httpPort: 40001
      HTTP_PORT: 40001
      miniappApiPort: 40002
      MINIAPP_PORT: 40002
      port: 40000
      WS_PORT: 40000
      connectionTickTimeout: 30000
      MONGO_URI: mongodb://root:password@mongo:27017
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "40000:40000"
      - "40001:40001"
      - "40002:40002"
    volumes:
      # 随 git pull 更新；在 ECS 上等同于 /root/workspace/miniapp_pro_backend/src/sysconfig
      - ./src/sysconfig:/app/config:ro
      - ./static:/app/static
      # 业务日志落盘到容器 /app/logs → 宿主机项目下 logs/backend（与 production/log_config 中 logs/*.log 一致）
      - ./logs/backend:/app/logs

  nginx:
    image: nginx:1.27-alpine
    pull_policy: if_not_present
    container_name: miniapp-nginx
    restart: unless-stopped
    depends_on:
      - backend_app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d
      - ./nginx/includes:/etc/nginx/includes:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./nginx/certbot/www:/var/www/certbot:ro
      - ./nginx/logs:/var/log/nginx
      - ./static:/usr/share/nginx/html/static:ro

networks:
  default:
    name: miniapp-backend-net

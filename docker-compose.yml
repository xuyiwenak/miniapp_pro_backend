# 在 ECS 上：仓库路径示例 /root/workspace/miniapp_pro_backend
# 典型流程：GitHub Actions / 手动 git pull 拉最新代码与 src/sysconfig → 再在项目根目录执行 docker compose up -d
# 配置目录挂载：./src/sysconfig → 容器内 /app/config（与 SYSCONFIG_ROOT 一致），子目录名需与 environment 一致（见 backend_app.environment）

version: "3.9"

services:
  mongo:
    image: mongo:7
    container_name: miniapp-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: password
    ports:
      - "27017:27017"
    volumes:
      - ./data/mongo:/data/db

  redis:
    image: redis:7-alpine
    container_name: miniapp-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - ./data/redis:/data

  backend_app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: miniapp-backend
    restart: unless-stopped
    depends_on:
      - mongo
      - redis
    environment:
      NODE_ENV: production
      # 与挂载一致：宿主机 ./src/sysconfig/development → /app/config/development
      SYSCONFIG_ROOT: /app/config
      environment: development
      ENV: development
      id: front_1
      SERVER_ID: front_1
      gameType: front
      GAME_TYPE: front
      httpPort: 40001
      HTTP_PORT: 40001
      miniappApiPort: 40002
      MINIAPP_PORT: 40002
      port: 40000
      WS_PORT: 40000
      connectionTickTimeout: 30000
      MONGO_URI: mongodb://root:password@mongo:27017
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "40000:40000"
      - "40001:40001"
      - "40002:40002"
    volumes:
      # 随 git pull 更新；在 ECS 上等同于 /root/workspace/miniapp_pro_backend/src/sysconfig
      - ./src/sysconfig:/app/config:ro
      - ./static:/app/static
      - ./logs/backend:/app/logs

  nginx:
    image: nginx:1.27-alpine
    container_name: miniapp-nginx
    restart: unless-stopped
    depends_on:
      - backend_app
    ports:
      - "80:80"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d
      - ./nginx/logs:/var/log/nginx
      - ./static:/usr/share/nginx/html/static:ro

networks:
  default:
    name: miniapp-backend-net

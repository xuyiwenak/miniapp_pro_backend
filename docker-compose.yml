# Nginx 配置位于本目录 ./nginx/（与 monorepo 根目录 nginx/ 同步维护，修改后请两处对齐或从根目录 cp -r nginx art_backend/）。
# 在 ECS 上：仓库路径示例 /root/workspace/miniapp_pro_backend
# 典型流程：GitHub Actions / 手动 git pull 拉最新代码与 src/sysconfig → 再在项目根目录执行 docker compose up -d
# 配置目录挂载：./src/sysconfig → 容器内 /app/config（与 SYSCONFIG_ROOT 一致），子目录名需与 environment 一致（见 backend_app.environment）
#
# 构建：本文件只有 backend_app 带 build:，`docker compose build` / `docker compose build backend_app` 只会构建后端镜像。
# mongo / redis / nginx 使用 pull_policy: if_not_present，本地已有镜像时 compose pull / up 不会反复从仓库拉取。
# backend_app.build.pull: false 避免每次构建时强制拉取 Dockerfile 里的 node 基础镜像（需更新基础镜像时可临时改为 true 或 docker compose build --pull）。

services:
  mongo:
    image: mongo:7
    pull_policy: if_not_present
    container_name: miniapp-mongo
    restart: unless-stopped
    stop_grace_period: 60s
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: password
    ports:
      - "27017:27017"
    volumes:
      - ./data/mongo:/data/db
    # 不固定 ipv4：与 backend 的 extra_hosts 绑定时，在部分 ECS/bridge 环境下会出现「解析到固定 IP 但 TCP 不通」；
    # 使用默认分配 + Docker DNS（服务名 mongo）即可稳定互访。
    healthcheck:
      test:
        [
          "CMD",
          "mongosh",
          "mongodb://root:password@127.0.0.1:27017/admin",
          "--quiet",
          "--eval",
          "db.adminCommand('ping')",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s

  redis:
    image: redis:7-alpine
    pull_policy: if_not_present
    container_name: miniapp-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - ./data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

  drawing_app:
    build:
      context: .
      dockerfile: Dockerfile
      pull: false
    image: art-backend:latest          # 两个容器共用同一镜像，build 只执行一次
    container_name: miniapp-drawing
    restart: unless-stopped
    command: ["node", "dist/apps/drawing/front.js"]
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      SYSCONFIG_ROOT: /app/config
      ENV: production
      environment: production
      SERVER_ID: drawing_1
      id: drawing_1
      GAME_TYPE: front
      gameType: front
      HTTP_PORT: 40001
      httpPort: 40001
      MINIAPP_PORT: 40002
      miniappApiPort: 40002
      WS_PORT: 40000
      port: 40000
      connectionTickTimeout: 30000
      MONGO_URI: mongodb://root:password@mongo:27017
      REDIS_HOST: redis
      REDIS_PORT: 6379
      COMPOSE_PROJECT_DIR: /workspace
    ports:
      - "40000:40000"
      - "40001:40001"
      - "40002:40002"
    volumes:
      - ./src/apps/drawing/sysconfig:/app/config:ro
      - ./static:/app/static
      - ./logs/drawing:/app/logs
      - /var/run/docker.sock:/var/run/docker.sock
      - ${PWD}:/workspace:ro

  begreat_app:
    image: art-backend:latest          # 复用 drawing_app 构建的镜像，无需重复 build
    container_name: miniapp-begreat
    restart: unless-stopped
    command: ["node", "dist/apps/begreat/front.js"]
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
      drawing_app:                     # 确保镜像先由 drawing_app build 完成
        condition: service_started
    environment:
      NODE_ENV: production
      SYSCONFIG_ROOT: /app/config
      ENV: production
      environment: production
      SERVER_ID: begreat_1
      id: begreat_1
      HTTP_PORT: 41001
      httpPort: 41001
      MINIAPP_PORT: 41002
      miniappApiPort: 41002
      MONGO_URI: mongodb://root:password@mongo:27017
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "41001:41001"
      - "41002:41002"
    volumes:
      - ./src/apps/begreat/sysconfig:/app/config:ro
      - ./static:/app/static
      - ./logs/begreat:/app/logs

  nginx:
    image: nginx:1.27-alpine
    pull_policy: if_not_present
    container_name: miniapp-nginx
    restart: unless-stopped
    depends_on:
      - backend_app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d
      - ./nginx/includes:/etc/nginx/includes:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./nginx/certbot/www:/var/www/certbot:ro
      - ./nginx/logs:/var/log/nginx
      - ./static:/usr/share/nginx/html/static:ro
      # 前端 SPA（art_web build 产物）：先在宿主机 build 后放到 art_web_dist/ 目录
      - ./art_web_dist:/usr/share/nginx/html/app:ro

networks:
  default:
    name: miniapp-backend-net
    ipam:
      config:
        # 勿与宿主机上其他 Docker 网络复用同一 subnet。多项目/遗留网络若都占 172.28.0.0/16，
        # 会出现两条同前缀路由指向不同 br-*，`ip route get` 命中错误网桥 → 容器互连 TCP 超时/拒连。
        # 部署前在宿主机执行：./scripts/check_docker_bridge_subnet_conflict.sh
        - subnet: ${DOCKER_SUBNET:-172.29.0.0/16}
